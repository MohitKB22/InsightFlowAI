global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "pipeline_api"
    static_configs:
      - targets: ["api:8080"]
    metrics_path: "/metrics"

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9101"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
